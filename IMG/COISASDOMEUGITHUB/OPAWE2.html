<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didática de Algoritmos: Busca Linear</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1, h2 { color: #333; }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        #array-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            gap: 10px;
            flex-wrap: wrap;
        }
        .array-item {
            width: 40px;
            height: 40px;
            border: 2px solid #3498db;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-weight: bold;
            background-color: white;
            transition: all 0.3s;
        }
        .array-item.active {
            background-color: #f1c40f;
            border-color: #e67e22;
        }
        .array-item.found {
            background-color: #2ecc71;
            border-color: #27ae60;
            color: white;
        }
        .controls { margin-top: 20px; }
        input, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #3498db;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover { background-color: #2980b9; }
        #log {
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Busca Linear</h1>
        <p>O algoritmo verifica cada elemento um por um até encontrar o alvo.</p>
        
        <div id="array-container"></div>

        <div class="controls">
            <input type="number" id="target" placeholder="Número para buscar" style="width: 150px;">
            <button onclick="iniciarBusca()">Buscar</button>
        </div>

        <div id="log">Digite um número e clique em Buscar.</div>
    </div>

    <script>
        // Dados iniciais
        const array = [10, 5, 8, 3, 12, 7, 15, 2];
        const container = document.getElementById('array-container');
        const log = document.getElementById('log');

        // Renderiza o array na tela
        function renderArray(highlightIndex = -1, foundIndex = -1) {
            container.innerHTML = '';
            array.forEach((num, index) => {
                const div = document.createElement('div');
                div.className = 'array-item';
                if (index === foundIndex) div.classList.add('found');
                else if (index === highlightIndex) div.classList.add('active');
                div.innerText = num;
                container.appendChild(div);
            });
        }

        // Função do Algoritmo: Busca Linear
        async function iniciarBusca() {
            const target = parseInt(document.getElementById('target').value);
            if (isNaN(target)) {
                log.innerText = "Por favor, insira um número válido.";
                return;
            }
            
            let found = false;
            log.innerText = `Iniciando busca por ${target}...`;

            for (let i = 0; i < array.length; i++) {
                renderArray(i); // Destaque o passo atual
                log.innerText = `Verificando índice ${i}: ${array[i]}...`;
                
                // Pausa para visualização (didático)
                await new Promise(resolve => setTimeout(resolve, 600));

                if (array[i] === target) {
                    renderArray(i, i); // Destaca o encontrado
                    log.innerText = `Encontrado! ${target} está no índice ${i}.`;
                    found = true;
                    break;
                }
            }

            if (!found) {
                renderArray();
                log.innerText = `${target} não foi encontrado no array.`;
            }
        }

        // Inicializa renderizando o array puro
        renderArray();
    </script>
</body>
</html>
